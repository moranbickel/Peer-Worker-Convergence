name: smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax + lint floor (bash -n, advisory shellcheck)
        run: bash tests/smoke.sh

      - name: Gate exit-code contracts
        run: bash tests/gate-contracts.sh
